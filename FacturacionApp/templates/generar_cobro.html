{% extends 'Webapp/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 dashboard-card">
                <div class="card-header bg-gradient-primary text-white text-center py-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-cash-coin me-2"></i>Registrar Pago</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info border-0 shadow-sm mb-4">
                        <small class="d-block text-uppercase fw-bold">Paciente:</small>
                        <span class="fs-5">{{ cita.id_paciente }}</span>
                        <hr class="my-2">
                        <small class="d-block">Cita del: {{ cita.fecha_hora|date:"d/m/Y H:i" }}</small>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Monto del Servicio</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-success fw-bold">$</span>
                                <input type="number" step="0.01" name="monto" class="form-control form-control-lg" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Método de Pago</label>
                            <select name="metodo" class="form-select" required>
                                <option value="" selected disabled>Seleccione una opción...</option>
                                {% for m in metodos %}
                                    <option value="{{ m.id_metodo_pago }}">{{ m.nombre_metodo }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Referencia (Opcional)</label>
                            <input type="text" name="referencia" class="form-control" placeholder="Número de aprobación o Nequi">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Notas adicionales</label>
                            <textarea name="notas" class="form-control" rows="2" placeholder="Ej: Pago parcial, descuento por convenio..."></textarea>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success fw-bold py-2 shadow-sm">
                                <i class="bi bi-check-circle me-2"></i>Confirmar Transacción
                            </button>
                            <a href="{% url 'lista_citas' %}" class="btn btn-link text-muted text-decoration-none">Volver a la agenda</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
