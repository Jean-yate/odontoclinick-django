{% extends 'Webapp/base.html' %}

{% block extra_css %}
<style>
    /* Tarjeta de Formulario Inflada */
    .clay-form-card {
        background-color: white;
        border-radius: 40px;
        padding: 3.5rem;
        box-shadow: var(--clay-shadow); /* Usamos la variable de base.html */
        border: none;
        max-width: 700px;
        margin: 0 auto;
    }

    .clay-form-card h3 {
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 2rem;
        text-align: center;
    }

    /* Estilo para los campos del formulario (Hundidos) */
    /* Django renderiza {{ form.as_p }}, así que apuntamos a los inputs internos */
    .clay-form-card input, 
    .clay-form-card select, 
    .clay-form-card textarea {
        display: block;
        width: 100%;
        padding: 0.8rem 1.2rem;
        font-size: 1rem;
        font-weight: 500;
        color: var(--secondary-color);
        background-color: #f0f4f9; /* Color de fondo suave */
        border: none;
        border-radius: 18px;
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.08), 
                    inset -4px -4px 8px rgba(255,255,255,0.8);
        transition: all 0.3s ease;
        margin-bottom: 1rem;
        outline: none;
    }

    .clay-form-card input:focus {
        box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1), 
                    0 0 0 3px rgba(63, 46, 35, 0.1);
        transform: scale(0.99);
    }

    /* Etiquetas (Labels) */
    .clay-form-card p label {
        font-weight: 700;
        margin-bottom: 0.5rem;
        margin-left: 0.5rem;
        color: var(--primary-color);
        display: block;
    }

    /* Botón Secundario Clay */
    .btn-clay-secondary {
        background-color: #e2e8f0;
        color: #475569;
        border: none;
        border-radius: 20px;
        padding: 0.8rem 1.8rem;
        font-weight: 700;
        box-shadow: 6px 6px 12px #d1d9e6, inset 2px 2px 4px rgba(255,255,255,0.5);
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
    }
    .btn-clay-secondary:hover {
        background-color: #cbd5e1;
        transform: translateY(-2px);
        color: #1e293b;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="clay-form-card">
        <h3><i class="bi bi-pencil-square me-2"></i>Editar Paciente</h3>
        
        <div class="text-center mb-4">
            <span class="badge rounded-pill px-3 py-2" style="background: var(--bg-body); color: var(--primary-color); font-weight: 700;">
                {{ paciente.nombre_usuario }}
            </span>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-body">
                {{ form.as_p }}
            </div>

            <div class="mt-5 d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> Guardar Cambios
                </button>
                <a href="{% url 'lista_pacientes' %}" class="btn-clay-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
