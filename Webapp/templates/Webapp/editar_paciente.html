{% extends 'Webapp/base.html' %}

{% block extra_css %}
<style>
    .clay-form-card {
        background-color: white;
        border-radius: 40px;
        padding: 3rem;
        box-shadow: var(--clay-shadow);
        border: none;
        max-width: 850px; /* Un poco más ancho para dos columnas */
        margin: 0 auto;
    }

    .section-title {
        color: var(--secondary-color);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 800;
        margin-top: 2rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid var(--bg-body);
        padding-bottom: 5px;
    }

    /* Estilo para los inputs renderizados por Django */
    .form-body p { margin-bottom: 1.5rem; }
    
    .form-body input, .form-body select, .form-body textarea {
        display: block;
        width: 100%;
        padding: 0.8rem 1.2rem;
        border-radius: 18px;
        background-color: #f0f4f9;
        border: none;
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.08), inset -4px -4px 8px rgba(255,255,255,0.8);
        outline: none;
    }

    .form-body label {
        font-weight: 700;
        color: var(--primary-color);
        margin-left: 10px;
        margin-bottom: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="clay-form-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary"><i class="bi bi-pencil-square me-2"></i>Editar Expediente</h3>
            <span class="badge rounded-pill px-4 py-2" style="background: var(--bg-body); color: var(--primary-color); font-size: 1rem;">
                {{ paciente.nombre }} {{ paciente.apellidos }}
            </span>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-body">
                <div class="section-title"><i class="bi bi-person-circle me-2"></i>Información Personal</div>
                <div class="row">
                    <div class="col-md-12">
                        {{ form_user.as_p }}
                    </div>
                </div>

                <div class="section-title"><i class="bi bi-medical-checklist me-2"></i>Datos Médicos (PacienteApp)</div>
                <div class="row">
                    <div class="col-md-12">
                        {{ form_clinico.as_p }}
                    </div>
                </div>
            </div>

            <div class="mt-5 d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-primary px-5 shadow-lg rounded-pill">
                    <i class="bi bi-save2-fill me-2"></i> Actualizar Todo
                </button>
                <a href="{% url 'lista_pacientes' %}" class="btn btn-light rounded-pill px-4 d-flex align-items-center" style="box-shadow: var(--clay-shadow);">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
