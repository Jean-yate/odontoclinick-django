{% extends 'Webapp/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card border-0 p-4 shadow-sm" style="border-radius: 40px; background: white; max-width: 450px; box-shadow: var(--clay-shadow);">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--primary-color);">Nueva Contraseña</h2>
            <p class="text-muted small">Por favor, ingresa tu nueva clave dos veces para confirmar.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit" class="btn btn-clay w-100 p-3 fw-bold mt-3">Cambiar Contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
