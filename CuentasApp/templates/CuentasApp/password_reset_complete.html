{% extends 'Webapp/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card border-0 p-5 text-center" style="border-radius: 40px; background: white; max-width: 500px; box-shadow: var(--clay-shadow);">
        <i class="bi bi-check-circle-fill fs-1 text-success mb-3"></i>
        <h2 class="fw-bold" style="color: var(--primary-color);">¡Contraseña Actualizada!</h2>
        <p class="text-muted">Tu clave ha sido cambiada correctamente. Ya puedes ingresar con tus nuevos datos.</p>
        <a href="{% url 'login' %}" class="btn-clay mt-3 text-decoration-none w-100">Iniciar Sesión</a>
    </div>
</div>
{% endblock %}
