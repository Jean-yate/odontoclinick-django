{% extends 'Webapp/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card border-0 p-5 text-center" style="border-radius: 40px; background: white; max-width: 500px; box-shadow: var(--clay-shadow);">
        <i class="bi bi-envelope-check fs-1 text-success mb-3"></i>
        <h2 class="fw-bold" style="color: var(--primary-color);">¡Revisa tu correo!</h2>
        <p class="text-muted">Te hemos enviado un enlace para restablecer tu contraseña. Si no lo ves en unos minutos, revisa tu carpeta de <b>spam</b>.</p>
        <a href="{% url 'login' %}" class="btn-clay mt-3 text-decoration-none">Volver al inicio</a>
    </div>
</div>
{% endblock %}
