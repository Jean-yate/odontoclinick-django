{% extends 'Webapp/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card border-0 p-4 shadow-sm" style="border-radius: 40px; background: white; max-width: 450px; box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff !important;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock fs-1 text-primary"></i>
            <h2 class="fw-bold mt-2" style="color: var(--primary-color);">¿Olvidaste tu clave?</h2>
            <p class="text-muted small">Ingresa tu correo y te enviaremos un enlace para recuperarla.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-bold ms-2">Correo Electrónico</label>
                <input type="email" name="email" class="form-control border-0 p-3 shadow-none" 
                       style="border-radius: 20px; background: #f0f2f5; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05) !important;" 
                       required placeholder="tu@correo.com">
            </div>
            <button type="submit" class="btn btn-clay w-100 p-3 fw-bold">Enviar Enlace</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-decoration-none small fw-bold text-muted">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
